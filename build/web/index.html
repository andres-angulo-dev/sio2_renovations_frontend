<body>
  <!-- Splash screen HTML/CSS — visible dès 75ms, avant le chargement de Flutter.
       Évite l'écran blanc de 3-5s sur mobile pendant le parsing de main.dart.js.
       Retiré automatiquement à l'événement flutter-first-frame. -->
  <div id="flutter-splash" style="
    position: fixed; inset: 0; z-index: 9999;
    background: #ffffff;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 20px;
    font-family: sans-serif;
  ">
    <img src="icons/Icon-192.png" width="72" height="72" alt="SiO₂ Rénovations">
    <div style="width: 56px; height: 3px; background: #e5e5e5; border-radius: 2px; overflow: hidden;">
      <div id="flutter-splash-bar" style="
        height: 100%; width: 0%; background: #1a1a1a;
        border-radius: 2px;
        animation: sio2-load 2s ease-in-out infinite;
      "></div>
    </div>
  </div>
  <style>
    @keyframes sio2-load {
      0%   { width: 0%;   margin-left: 0; }
      50%  { width: 100%; margin-left: 0; }
      100% { width: 0%;   margin-left: 100%; }
    }
  </style>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('flutter-splash');
      if (el) {
        el.style.transition = 'opacity 0.3s ease';
        el.style.opacity = '0';
        setTimeout(function () { el.remove(); }, 300);
      }
    });
  </script>
